<!DOCTYPE html>
<html>
<head>
    <title>Mini CBT Quiz</title>
</head>
<body>
    <h1>{{ question.text }}</h1>

    <!-- Quiz Form -->
   <form method="POST">
    {% for option in question.options %}
        <input type="radio" name="answer" value="{{ 'abcd'[loop.index0] }}" required> {{ option }} <br>
    {% endfor %}
    
    <input type="hidden" name="index" value="{{ index }}">
    <button type="submit">Next</button>
</form>

<form method="POST" action="{{ url_for('undo') }}">
    <input type="hidden" name="index" value="{{ index }}">
    <button type="submit">Undo Last Answer</button>
</form>
</body>
</html>
