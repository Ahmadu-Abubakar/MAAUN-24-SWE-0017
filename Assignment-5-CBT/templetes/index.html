<!DOCTYPE html>
<html>
<head>
    <title>Mini CBT Quiz</title>
</head>
<body>
    <h1>{{ question.text }}</h1>
    <form method="POST">
        {% for option in question.options %}
            <input type="radio" name="answer" value="{{ loop.index0|add:'a' }}" required> {{ option }} <br>
        {% endfor %}
        <input type="hidden" name="index" value="{{ index }}">
        <button type="submit">Next</button>
    </form>
</body>
</html>
